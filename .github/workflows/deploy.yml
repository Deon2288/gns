name: Deploy

on:
  push:
    branches: [master, main]
    tags: ['v*.*.*']

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    permissions:
      contents: read
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    needs: []

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend
        env:
          CI: false
          REACT_APP_API_URL: ${{ secrets.API_URL || 'http://localhost:5000' }}

      - name: Build Docker images
        run: |
          docker build -t gns-backend:${{ github.sha }} -f Dockerfile.backend .
          docker build -t gns-frontend:${{ github.sha }} -f Dockerfile.frontend .

      - name: Deploy notification
        run: |
          echo "Deployment completed for commit ${{ github.sha }}"
          echo "Backend: gns-backend:${{ github.sha }}"
          echo "Frontend: gns-frontend:${{ github.sha }}"
