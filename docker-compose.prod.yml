version: '3.8'

services:
  backend:
    image: your-backend-image:latest
    environment:
      DATABASE_URL: postgres://user:password@postgres:5432/dbname
    depends_on:
      - postgres
    ports:
      - "5000:5000"

  frontend:
    image: your-frontend-image:latest
    ports:
      - "80:80"

  postgres:
    image: postgres:latest
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: dbname
    ports:
      - "5432:5432"

  redis:
    image: redis:latest
    ports:
      - "6379:6379"

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - frontend
      - backend
