version: '3.8'\n\nservices:\n  backend:\n    image: your_backend_image\n    build: ./backend\n    ports:\n      - '8000:8000'\n    depends_on:\n      - postgres\n      - redis\n\n  frontend:\n    image: your_frontend_image\n    build: ./frontend\n    ports:\n      - '3000:3000'\n    depends_on:\n      - backend\n\n  postgres:\n    image: postgres:latest\n    environment:\n      POSTGRES_USER: postgres\n      POSTGRES_PASSWORD: password\n    volumes:\n      - postgres_data:/var/lib/postgresql/data\n\n  redis:\n    image: redis:latest\n\n  prometheus:\n    image: prom/prometheus\n    volumes:\n      - ./prometheus:/etc/prometheus\n    ports:\n      - '9090:9090'\n\n  grafana:\n    image: grafana/grafana\n    ports:\n      - '3001:3000'\n\nvolumes:\n  postgres_data: