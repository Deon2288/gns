openapi: 3.0.0
info:
  title: GNS API
  description: API documentation for GNS
  version: 1.0.0
servers:
  - url: https://api.example.com/v1
paths:
  /endpoints:
    get:
      summary: Retrieve all endpoints
      parameters:
        - name: Authorization
          in: header
          required: true
          description: Bearer token for authentication
          schema:
            type: string
      responses:
        '200':
          description: A list of API endpoints
          content:
            application/json:
              schema:
                type: object
                properties:
                  endpoints:
                    type: array
                    items:
                      type: string
        '401':
          description: Unauthorized
        '500':
          description: Internal Server Error        
# Add more endpoints with similar structure
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  responses:
    NotFound:
      description: The specified resource was not found
    InternalError:
      description: An internal server error occurred
  schemas:
    Error:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
